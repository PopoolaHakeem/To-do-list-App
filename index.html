<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>To-Do List</title>

</head>

<body class="bg-gradient-to-r from-[#313234] to-[#8c929c] min-h-screen flex flex-col items-center justify-evenly">

<!-- Main Content -->
  <div class="container bg-red-900 space-y-5">
    <h1 class="text-3xl md:text-4xl font-mono  ">My To-Do List</h1>

    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Enter a task">
      <button class="text-[12px] sm:text-[] px-4 py-2" onclick="addTask()">Add Task</button>
    </div>

    <!-- Task List -->
    <ul id="taskList"></ul>
  </div>

  <!-- Footer -->
<footer class="text-center mt-5 text-sm text-gray-400">
    &copy; 2026 To-Do List App. All rights reserved.
  </footer>

  <!-- /* 313234 525e75 8c929c */ -->
  <script src="script.js"></script>
</body>

</html>
